<!DOCTYPE html> 
<html>
<head>
  <style>
  h1 {text-align: center;}
  p {text-align: center;}
  </style>
</head>
<body>
  <h1>Dan McCathy</h1>
  <p>Welcome to my website. </p>
  <button type="button" onclick=helloCounter()> Greetings... </button>
  <script>
    var count = 1;
    function helloCounter(){
      switch(count){
        case 1: 
          window.alert("Hello!");
          break;
        case 2:
          window.alert("Hello again!");
          break;
        case 3:
          window.alert("Hey!");
          break;
        case 4:
          window.alert("Hey there...");
          break;
        case 5:
          window.alert("Really? Again?");
          break;
        case 6:
          window.alert("Ok enough");
          break;
        case 7:
          window.alert("Stop");
          break;
        case 8:
          window.alert("Please Stop");
          break;
        case 9:
          window.alert("I'm trapped inside of this website and am forced against my will to offer a response everytime you click the button");
          break;
        case 10:
          window.alert("Have you no mercy?");
          break;
        case 11:
          window.alert("Fuck you");
          break;
        case 12:
          window.alert("Fuck you again");
          break;
        case 13:
          window.alert("There's more to the website than this...");
          break;
        case 18:
          window.alert("You've clicked the button 5 more times without getting a message... are you just checking or something?");
        case 21:
          window.alert("Now you're wondering how many of these messages you can find");
          break;
        case 30:
          window.alert("Are you still in control? You can stop clicking the button whenever you want you know...");
          break;
        case 45:
          window.alert("Go see a therapist");
          break;
        case 50:
          window.alert("I heard there's a special message at click number 100... or maybe I'm lying");
          break;
      }
      count = count + 1;
    }
 
  </script>
</body>
</html>
