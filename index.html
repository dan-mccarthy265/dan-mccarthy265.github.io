<!DOCTYPE html>
<html>
<head>
  <style>
  .nameannounce {
      text-align: center;
      color: white;
      line-height: 0.5;

  }

  .bodyparagraphs1 {
    font-family: optima;
    text-align: left;
    color: navy;
    font-size: 20px;
  }

  .heading1{
    text-align: left;
    font-size: 40px;
    color: seagreen;
  }

  .sections {
    overflow: hidden;
    background-color: LightSteelBlue;
    border: white;
    color: #696969;
  }

  .sections button {
    background-color: inherit;
    float: left;
    border: none;
    outline: none;
    cursor: pointer;
    padding: 14px 16px;
    transition: 1.2s;
    font-size: 30px;
    color: #696969;
  }

  .sections button:hover {
    background-color: SlateGray;
  }


  .sections button.active {
    background-color: LightSlateGray;
  }


  .sectionsContent {
    display: none;
    padding: 6px 12px;
    border-top: none;
    color: white;
  }
  </style>
  <link  rel="shortcut icon" type="image/png" href="img/favicon.png">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
.fa {
  padding: 20px;
  font-size: 40px;
  width: 50px;
  text-align: center;
  text-decoration: none;
  border-radius: 50%;
  margin: 5px 2px;
}

.fa:hover {
    opacity: 0.7;
}

.fa-facebook {
  text-align: center;
  background: #3B5998;
  color: white;
}


.fa-google {
  text-align: center;
  background: #dd4b39;
  color: white;
}

.fa-linkedin {
  text-align: center;
  background: #007bb5;
  color: white;
}

</style>

</head>



<body style="background-color: #696969;">
  <div class="nameannounce">
      <em> Hey, I'm </em>
      <h1>Dan McCarthy</h1>
      <h2>Welcome to my website </h2>
  </div>

<div class="sections">
  <button class="tablinks" onclick="openSection(event, 'About Me')">About Me</button>
  <button class="tablinks" onclick="openSection(event, 'Projects')">Projects</button>
  <button class="tablinks" onclick="openSection(event, 'Tools')">Tools</button>
</div>

<div id="About Me" class="sectionsContent">
  <h3>About Me</h3>
  <p>Things about me etc...</p>
</div>

<div id="Projects" class="sectionsContent">
  <h3>Projects</h3>
  <p>Things I've done...</p>
</div>

<div id="Tools" class="sectionsContent">
  <h3>Tools</h3>
  <p>Things to help.</p>
</div>

<script>
function openSection(evt, sectionName) {
  var i, sectionsContent, tablinks;
  sectionsContent = document.getElementsByClassName("sectionsContent");
  for (i = 0; i < sectionsContent.length; i++) {
    sectionsContent[i].style.display = "none";
  }
  tablinks = document.getElementsByClassName("tablinks");
  for (i = 0; i < tablinks.length; i++) {
    tablinks[i].className = tablinks[i].className.replace(" active", "");
  }
  document.getElementById(sectionName).style.display = "block";
  evt.currentTarget.className += " active";
}
</script>

<div>
  <a href="#" class="fa fa-facebook"></a>
  <a href="#" class="fa fa-google"></a>
  <a href="#" class="fa fa-linkedin"></a>
</div>



</body>
</html>
