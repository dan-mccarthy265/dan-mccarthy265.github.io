<!DOCTYPE html> 
<html>
<head>
  <style>
  h1 {text-align: center;}
  p {text-align: center;}
  </style>
</head>
<body>
  <h1>Dan McCathy</h1>
  <p>Welcome to my website. </p>
  <button type="button" onclick=helloCounter()> Greetings... </button>
  <script>
    var count = 1;
    function helloCounter(){
      switch(count){
        case 1: 
          window.alert("Hello!!");
          break;
        case 2:
          window.alert("Hello again!");
          break;
      }
      count = count + 1;
    }
 
  </script>
</body>
</html>
